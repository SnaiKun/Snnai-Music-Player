<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Snnai Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Load Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-base: #0b0f19;
      --bg-surface: rgba(22, 28, 45, 0.4);
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.15);
    }
    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    /* Ambient glow background */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }
    .reset-container {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      z-index: 1;
      box-sizing: border-box;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      object-fit: contain;
    }
    .logo-title {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .desc {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      transition: all 0.2s;
    }
    input:focus {
      border-color: var(--accent-light);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 12px var(--accent-glow);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
    }
    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
    }
    .message.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34d399;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="reset-container">
    <div class="logo-container">
      <img src="assets/logo.png" class="logo-icon" alt="Snnai Logo">
      <div class="logo-title">Snnai</div>
    </div>
    
    <div id="reset-flow">
      <h2>Create New Password</h2>
      <p class="desc">Enter your new password below to update your account credentials.</p>
      
      <div id="status-message" class="message"></div>
      
      <form id="reset-form">
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" id="submit-btn" class="btn">
          Update Password
        </button>
      </form>
    </div>
    
    <div id="success-flow" style="display: none; text-align: center;">
      <i data-lucide="check-circle" style="color: #34d399; width: 48px; height: 48px; margin: 0 auto 16px;"></i>
      <h2>Password Updated!</h2>
      <p class="desc">Your password has been successfully reset. You can now close this page and sign in to the desktop app with your new password.</p>
    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Supabase credentials
    const supabaseUrl = 'https://tjrpeifrekpykmchydof.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqcnBlaWZyZWtweWttY2h5ZG9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDEwNjUsImV4cCI6MjA5OTE3NzA2NX0.LSWpsA0oby1MwYLiWB8ZMTTGLhxFUaLG7bQFME4Bam0';
    
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('reset-form');
    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const submitBtn = document.getElementById('submit-btn');
    const statusMessage = document.getElementById('status-message');
    const resetFlow = document.getElementById('reset-flow');
    const successFlow = document.getElementById('success-flow');

    // Supabase automatically updates the session when redirected with hash parameters.
    // Let's verify we have a recovery session before allowing reset.
    async function checkSession() {
      const hasHash = window.location.hash && (window.location.hash.includes('access_token') || window.location.hash.includes('type=recovery'));
      if (!hasHash) {
        showMessage('Error: Invalid or expired password reset link. Please request a new link from the app.', true);
        submitBtn.disabled = true;
      }
    }

    function showMessage(text, isError) {
      statusMessage.textContent = text;
      statusMessage.className = `message ${isError ? 'error' : 'success'}`;
      statusMessage.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      
      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match.', true);
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Updating...';
      
      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
        if (error) throw error;
        
        // Show success flow
        resetFlow.style.display = 'none';
        successFlow.style.display = 'block';
        lucide.createIcons();
      } catch (err) {
        showMessage(err.message || 'Failed to update password.', true);
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Update Password';
      }
    });

    checkSession();
  </script>
</body>
</html>
